# Plans Connector
# Queries and mutations for nutrition/training plan CRUD, predefined library,
# plan assignments, and plan change requests.
# Ref: D-006, D-007, D-071, D-080, D-082, FR-211–FR-214, BR-269–BR-272

# ─── Queries ─────────────────────────────────────────────────────────────────

query GetMyPlans @auth(level: USER) {
  nutritionPlans(
    where: {
      _or: [
        { professionalId: { eq_expr: "auth.uid" } }
        { studentId: { eq_expr: "auth.uid" } }
      ]
    }
    orderBy: [{ updatedAt: DESC }]
  ) {
    id
    name
    isDraft
    caloriesTarget
    carbsTarget
    proteinsTarget
    fatsTarget
    createdAt
    updatedAt
  }
}

query GetMyPredefinedPlans @auth(level: USER) {
  nutritionPlans(
    where: {
      professionalId: { eq_expr: "auth.uid" }
      isDraft: { eq: false }
      studentId: { isNull: true }
    }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    name
    caloriesTarget
    carbsTarget
    proteinsTarget
    fatsTarget
    createdAt
    updatedAt
  }
}

query GetNutritionPlanDetail($planId: String!) @auth(level: USER) {
  nutritionPlan(id: $planId) {
    id
    name
    isDraft
    caloriesTarget
    carbsTarget
    proteinsTarget
    fatsTarget
    createdAt
    updatedAt
    meals: nutritionPlanMeals_on_nutritionPlan {
      id
      foodName
      calories
      carbs
      proteins
      fats
      portions
    }
  }
}

query GetTrainingPlanDetail($planId: String!) @auth(level: USER) {
  trainingPlan(id: $planId) {
    id
    name
    isDraft
    focusArea
    createdAt
    updatedAt
    sessions: trainingPlanSessions_on_trainingPlan {
      id
      sessionName
      dayOfWeek
      durationMinutes
      items: trainingSessionItems_on_session {
        id
        exerciseName
        sets
        reps
        weight
      }
    }
  }
}

query GetStudentPlanChangeRequests($studentUid: String!) @auth(level: USER) {
  planChangeRequests(
    where: { studentAuthUid: { eq: $studentUid } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    planId
    planType
    studentAuthUid
    requestText
    status
    reviewedAt
    createdAt
  }
}

query GetMyPlanChangeRequests @auth(level: USER) {
  planChangeRequests(
    where: { studentAuthUid: { eq_expr: "auth.uid" } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    planId
    planType
    status
    requestText
    createdAt
  }
}

# ─── Mutations ────────────────────────────────────────────────────────────────

mutation CreateNutritionPlan(
  $name: String!
  $caloriesTarget: Int
  $carbsTarget: Int
  $proteinsTarget: Int
  $fatsTarget: Int
) @auth(level: USER) {
  nutritionPlan_insert(
    data: {
      professionalId_expr: "auth.uid"
      name: $name
      isDraft: false
      caloriesTarget: $caloriesTarget
      carbsTarget: $carbsTarget
      proteinsTarget: $proteinsTarget
      fatsTarget: $fatsTarget
    }
  )
}

mutation UpdateNutritionPlan(
  $planId: String!
  $name: String!
  $caloriesTarget: Int
  $carbsTarget: Int
  $proteinsTarget: Int
  $fatsTarget: Int
) @auth(level: USER) {
  nutritionPlan_update(
    key: { id: $planId }
    data: {
      name: $name
      caloriesTarget: $caloriesTarget
      carbsTarget: $carbsTarget
      proteinsTarget: $proteinsTarget
      fatsTarget: $fatsTarget
    }
  )
}

mutation AddNutritionMealItem(
  $planId: String!
  $foodName: String!
  $calories: Int
  $carbs: Int
  $proteins: Int
  $fats: Int
  $portions: Float
) @auth(level: USER) {
  nutritionPlanMeal_insert(
    data: {
      nutritionPlan: { id: $planId }
      foodName: $foodName
      calories: $calories
      carbs: $carbs
      proteins: $proteins
      fats: $fats
      portions: $portions
    }
  )
}

mutation RemoveNutritionMealItem($itemId: String!) @auth(level: USER) {
  nutritionPlanMeal_delete(key: { id: $itemId })
}

mutation CreateTrainingPlan($name: String!, $focusArea: String) @auth(level: USER) {
  trainingPlan_insert(
    data: {
      professionalId_expr: "auth.uid"
      name: $name
      isDraft: false
      focusArea: $focusArea
    }
  )
}

mutation UpdateTrainingPlan(
  $planId: String!
  $name: String!
  $focusArea: String
) @auth(level: USER) {
  trainingPlan_update(
    key: { id: $planId }
    data: { name: $name, focusArea: $focusArea }
  )
}

mutation AddTrainingSession(
  $planId: String!
  $sessionName: String!
  $dayOfWeek: Int
  $durationMinutes: Int
) @auth(level: USER) {
  trainingPlanSession_insert(
    data: {
      trainingPlan: { id: $planId }
      sessionName: $sessionName
      dayOfWeek: $dayOfWeek
      durationMinutes: $durationMinutes
    }
  )
}

mutation RemoveTrainingSession($sessionId: String!) @auth(level: USER) {
  trainingPlanSession_delete(key: { id: $sessionId })
}

mutation AddTrainingSessionItem(
  $sessionId: String!
  $exerciseName: String!
  $sets: Int
  $reps: Int
  $weight: Float
) @auth(level: USER) {
  trainingSessionItem_insert(
    data: {
      session: { id: $sessionId }
      exerciseName: $exerciseName
      sets: $sets
      reps: $reps
      weight: $weight
    }
  )
}

mutation RemoveTrainingSessionItem($itemId: String!) @auth(level: USER) {
  trainingSessionItem_delete(key: { id: $itemId })
}

mutation SubmitPlanChangeRequest(
  $planId: String!
  $planType: String!
  $requestText: String!
) @auth(level: USER) {
  planChangeRequest_insert(
    data: {
      planId: $planId
      planType: $planType
      studentAuthUid_expr: "auth.uid"
      requestText: $requestText
      status: "pending"
    }
  )
}

mutation ReviewPlanChangeRequest(
  $requestId: String!
  $status: String!
) @auth(level: USER) {
  planChangeRequest_update(
    key: { id: $requestId }
    data: { status: $status }
  )
}

mutation BulkAssignNutritionPlan(
  $planId: String!
  $studentUid: String!
) @auth(level: USER) {
  planAssignment_insert(
    data: {
      planId: $planId
      planType: "nutrition"
      studentAuthUid: $studentUid
      professionalAuthUid_expr: "auth.uid"
      isActive: true
    }
  )
}
