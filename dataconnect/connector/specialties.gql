# Specialties Connector
# Queries and mutations for professional specialty and credential management.
# Ref: FR-174–FR-177, D-034, D-035, BR-234–BR-240

# ─── Queries ─────────────────────────────────────────────────────────────────

query GetProfessionalSpecialties @auth(level: USER) {
  specialties(
    where: { professionalAuthUid: { eq_expr: "auth.uid" } }
    orderBy: [{ createdAt: ASC }]
  ) {
    id
    specialty
    isActive
    credential: credentials_on_specialty(limit: 1) {
      id
      credentialType
      registryId
      authority
      country
    }
  }
}

# ─── Mutations ────────────────────────────────────────────────────────────────

mutation AddProfessionalSpecialty($specialty: String!) @auth(level: USER) {
  specialty_insert(
    data: {
      professionalAuthUid_expr: "auth.uid"
      specialty: $specialty
      isActive: true
    }
  )
}

mutation RemoveProfessionalSpecialty($specialtyId: String!) @auth(level: USER) {
  specialty_update(
    key: { id: $specialtyId }
    data: { isActive: false }
  )
}

mutation UpsertProfessionalCredential(
  $specialtyId: String!
  $registryId: String!
  $authority: String!
  $country: String!
) @auth(level: USER) {
  credential_upsert(
    data: {
      id: $specialtyId
      specialty: { id: $specialtyId }
      credentialType: "professional_registry"
      registryId: $registryId
      authority: $authority
      country: $country
    }
  )
}
