# Starter Templates Connector
# Queries and mutations for managing professional starter plan templates.
# Ref: BL-006, FR-212, FR-247, AC-256, BR-270, TC-260

# ─── Queries ────────────────────────────────────────────────────────────────────

query GetStarterTemplates($planType: String) @auth(level: USER) {
  starterTemplates(where: { planType: { eq: $planType } }, orderBy: [{ name: ASC }]) {
    id
    planType
    name
    description
    createdAt
    updatedAt
  }
}

query GetStarterTemplate($id: String!) @auth(level: USER) {
  starterTemplate(id: $id) {
    id
    planType
    name
    description
    createdAt
    updatedAt
  }
}

query GetNutritionTemplates @auth(level: USER) {
  starterTemplates(where: { planType: { eq: "nutrition" } }, orderBy: [{ name: ASC }]) {
    id
    planType
    name
    description
    createdAt
  }
}

query GetTrainingTemplates @auth(level: USER) {
  starterTemplates(where: { planType: { eq: "training" } }, orderBy: [{ name: ASC }]) {
    id
    planType
    name
    description
    createdAt
  }
}

query GetTemplateStats($templateId: UUID!) @auth(level: USER) {
  templateUsageStat(key: { id: $templateId }) {
    templateId
    cloneCount
    assignmentCount
    updatedAt
  }
}

query GetPopularTemplates($limit: Int!) @auth(level: USER) {
  templateUsageStats(orderBy: [{ cloneCount: DESC }], limit: $limit) {
    templateId
    cloneCount
    assignmentCount
  }
}

# ─── Mutations ──────────────────────────────────────────────────────────────────

mutation CreateStarterTemplate($planType: String!, $name: String!, $description: String)
@auth(level: USER) {
  starterTemplate_insert(
    data: { planType: $planType, name: $name, description: $description }
  )
}

mutation UpdateStarterTemplate($id: String!, $name: String, $description: String)
@auth(level: USER) {
  starterTemplate_update(id: $id, data: { name: $name, description: $description })
}

mutation DeleteStarterTemplate($id: String!) @auth(level: USER) {
  starterTemplate_delete(id: $id)
}

mutation CloneAsNutritionPlan(
  $professionalId: String!
  $sourceTemplateId: String!
  $name: String!
) @auth(level: USER) {
  nutritionPlan_insert(
    data: {
      professionalId: $professionalId
      sourceTemplate: { id: $sourceTemplateId }
      name: $name
      isDraft: true
    }
  )
}

mutation CloneAsTrainingPlan(
  $professionalId: String!
  $sourceTemplateId: String!
  $name: String!
) @auth(level: USER) {
  trainingPlan_insert(
    data: {
      professionalId: $professionalId
      sourceTemplate: { id: $sourceTemplateId }
      name: $name
      isDraft: true
    }
  )
}

mutation InitializeTemplateStats($templateId: String!) @auth(level: USER) {
  templateUsageStat_insert(
    data: { templateId: $templateId, cloneCount: 0, assignmentCount: 0 }
  )
}

mutation IncrementTemplateCloneCount($templateId: UUID!, $cloneCount: Int!) @auth(level: USER) {
  templateUsageStat_update(
    key: { id: $templateId }
    data: { cloneCount: $cloneCount }
  )
}

mutation IncrementTemplateAssignmentCount($templateId: UUID!, $assignmentCount: Int!) @auth(level: USER) {
  templateUsageStat_update(
    key: { id: $templateId }
    data: { assignmentCount: $assignmentCount }
  )
}
