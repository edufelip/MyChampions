# Auth Profile Connector
# Queries and mutations for user profile management (role-lock, upsert, delete).
# Ref: FR-103, D-097, D-050, BR-262

# ─── Queries ─────────────────────────────────────────────────────────────────

query GetMyProfile @auth(level: USER) {
  userProfile(key: { id_expr: "auth.uid" }) {
    id
    authUid
    displayName
    emailNormalized
    lockedRole
    locale
    createdAt
    updatedAt
  }
}

# ─── Mutations ────────────────────────────────────────────────────────────────

mutation UpsertUserProfile(
  $displayName: String!
  $emailNormalized: String!
) @auth(level: USER) {
  userProfile_upsert(
    data: {
      id_expr: "auth.uid"
      authUid_expr: "auth.uid"
      displayName: $displayName
      emailNormalized: $emailNormalized
    }
  )
}

mutation SetLockedRole($role: String!) @auth(level: USER) {
  userProfile_update(
    key: { id_expr: "auth.uid" }
    data: { lockedRole: $role }
  )
}

mutation DeleteProfile @auth(level: USER) {
  userProfile_delete(key: { id_expr: "auth.uid" })
}
