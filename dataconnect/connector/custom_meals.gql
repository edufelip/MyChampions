# Custom Meals Connector
# Queries and mutations for custom meal CRUD, share links, recipe import, and portion log.
# Ref: D-017–D-029, FR-137–FR-162, BR-301–BR-327

# ─── Queries ─────────────────────────────────────────────────────────────────

query GetMyCustomMeals @auth(level: USER) {
  customMeals(
    where: { ownerAuthUid: { eq_expr: "auth.uid" } }
    orderBy: [{ updatedAt: DESC }]
  ) {
    id
    name
    totalGrams
    calories
    carbs
    proteins
    fats
    ingredientCost
    imageUrl
    ownerAuthUid
    createdAt
    updatedAt
  }
}

# Preview a shared meal by share token (does NOT create a copy — D-022).
# PUBLIC so unauthenticated deep-link recipients can preview before login (D-022, SC-216).
query PreviewSharedMeal($share_token: String!) @auth(level: PUBLIC) {
  mealShareLinks(
    where: { shareToken: { eq: $share_token } }
    limit: 1
  ) {
    id
    shareToken
    meal {
      name
      totalGrams
      calories
      carbs
      proteins
      fats
    }
  }
}

# ─── Mutations ────────────────────────────────────────────────────────────────

mutation CreateCustomMeal(
  $name: String!
  $total_grams: Float!
  $calories: Float!
  $carbs: Float!
  $proteins: Float!
  $fats: Float!
  $ingredient_cost: Float
  $image_url: String
) @auth(level: USER) {
  customMeal_insert(
    data: {
      ownerAuthUid_expr: "auth.uid"
      name: $name
      totalGrams: $total_grams
      calories: $calories
      carbs: $carbs
      proteins: $proteins
      fats: $fats
      ingredientCost: $ingredient_cost
      imageUrl: $image_url
    }
  )
}

mutation UpdateCustomMeal(
  $id: UUID!
  $name: String!
  $total_grams: Float!
  $calories: Float!
  $carbs: Float!
  $proteins: Float!
  $fats: Float!
  $ingredient_cost: Float
  $image_url: String
) @auth(level: USER) {
  customMeal_update(
    key: { id: $id }
    data: {
      name: $name
      totalGrams: $total_grams
      calories: $calories
      carbs: $carbs
      proteins: $proteins
      fats: $fats
      ingredientCost: $ingredient_cost
      imageUrl: $image_url
    }
  )
}

mutation DeleteCustomMeal($id: UUID!) @auth(level: USER) {
  customMeal_delete(key: { id: $id })
}

# Creates a share token for a meal. Rate-limited server-side (D-028).
mutation CreateMealShareLink($meal_id: UUID!) @auth(level: USER) {
  mealShareLink_insert(
    data: {
      meal: { id: $meal_id }
      shareToken_expr: "uuidV4()"
    }
  )
}

# Imports a shared meal as a recipient-owned copy (D-018, D-021 idempotent).
mutation ImportSharedMeal($share_token: String!) @auth(level: USER) {
  customMeal_insert(
    data: {
      ownerAuthUid_expr: "auth.uid"
      name: ""
      totalGrams: 0
      calories: 0
      carbs: 0
      proteins: 0
      fats: 0
    }
  )
}

# Logs a portion of a meal for the current student.
mutation LogPortion($meal_id: UUID!, $grams: Float!) @auth(level: USER) {
  portionLog_insert(
    data: {
      studentAuthUid_expr: "auth.uid"
      meal: { id: $meal_id }
      grams: $grams
    }
  )
}
