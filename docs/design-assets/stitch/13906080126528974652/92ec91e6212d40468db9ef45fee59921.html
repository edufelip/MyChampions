<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In Playful</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ff7b72", // Coral pink
                        "background-light": "#fff5f0", // Soft pastel peach
                        "background-dark": "#221410",
                        "blob-yellow": "#ffeca1",
                        "blob-mint": "#a1e8cc",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"],
                        "serif": ["Georgia", "serif"] // Fallback for rounded serif if needed
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .bouncy-button {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bouncy-button:active {
            transform: scale(0.95);
        }
        .blob-1 {
            position: absolute;
            top: -10%;
            left: -15%;
            width: 300px;
            height: 300px;
            background: #ffeca1;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            z-index: 0;
            opacity: 0.6;
        }
        .blob-2 {
            position: absolute;
            bottom: -5%;
            right: -20%;
            width: 350px;
            height: 350px;
            background: #a1e8cc;
            border-radius: 50% 50% 30% 70% / 50% 40% 60% 50%;
            z-index: 0;
            opacity: 0.6;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen relative overflow-hidden flex justify-center items-center">
<!-- Decorative Blobs -->
<div class="blob-1"></div>
<div class="blob-2"></div>
<div class="relative z-10 w-full max-w-md mx-auto h-full flex flex-col p-6 h-screen">
<!-- Header -->
<div class="flex items-center justify-between py-4">
<button class="flex items-center justify-center size-12 bg-white dark:bg-slate-800 rounded-full shadow-sm text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="w-12"></div> <!-- Spacer for balance -->
</div>
<!-- Title Area -->
<div class="mt-8 mb-10 text-center">
<div class="w-24 h-24 mx-auto mb-6 bg-white rounded-full shadow-md flex items-center justify-center border-4 border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl">fitness_center</span>
</div>
<h2 class="text-3xl font-serif font-bold text-slate-900 dark:text-white tracking-tight">Welcome back!</h2>
<p class="mt-2 text-slate-600 dark:text-slate-400">Ready to crush your goals today?</p>
</div>
<!-- Form -->
<div class="flex flex-col gap-5 w-full mt-4">
<!-- Email Input -->
<label class="flex flex-col">
<span class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-4">Email Address</span>
<input class="w-full bg-white dark:bg-slate-800 border-2 border-white dark:border-slate-700 focus:border-primary focus:ring-4 focus:ring-primary/20 rounded-full h-14 px-6 text-base shadow-[0_4px_10px_rgba(0,0,0,0.03)] transition-all placeholder:text-slate-400" placeholder="hello@fitness.app" type="email" value=""/>
</label>
<!-- Password Input -->
<label class="flex flex-col relative">
<span class="text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 ml-4">Password</span>
<div class="relative w-full">
<input class="w-full bg-white dark:bg-slate-800 border-2 border-white dark:border-slate-700 focus:border-primary focus:ring-4 focus:ring-primary/20 rounded-full h-14 pl-6 pr-14 text-base shadow-[0_4px_10px_rgba(0,0,0,0.03)] transition-all placeholder:text-slate-400" placeholder="••••••••" type="password" value=""/>
<button class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary size-10 flex items-center justify-center rounded-full">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
<div class="flex justify-end pr-2">
<a class="text-sm font-bold text-primary hover:text-primary/80" href="#">Forgot Password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-14 mt-4 bg-primary text-white rounded-full font-bold text-lg shadow-[0_8px_20px_rgba(255,123,114,0.3)] bouncy-button flex items-center justify-center gap-2">
                Sign In
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Social Login -->
<div class="mt-auto pt-8 pb-4 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400 mb-4 font-medium">Or continue with</p>
<div class="flex justify-center gap-4">
<button class="size-14 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-md border-2 border-[#ea4335]/20 hover:border-[#ea4335]/50 bouncy-button text-[#ea4335]">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.523,2.951,15.1,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
</button>
<button class="size-14 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-md border-2 border-slate-900/10 hover:border-slate-900/30 bouncy-button text-slate-900 dark:text-white dark:border-white/10 dark:hover:border-white/30">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879V14.89h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.989C18.343 21.129 22 16.99 22 12c0-5.523-4.477-10-10-10z"></path>
</svg>
</button>
</div>
<p class="mt-8 text-sm text-slate-600 dark:text-slate-400 font-medium">
                New here? <a class="text-primary font-bold hover:underline" href="#">Create an account</a>
</p>
</div>
</div>
</body></html>
